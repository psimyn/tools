<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f1115" />
<title>Spin</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --ink: #e9edf5;
    --muted: #8993a7;
    --accent: #ffd84d;
    --shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    height: 100svh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body { display: flex; flex-direction: column; }

  #stage {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
  }
  #view {
    max-width: 100%;
    max-height: 100%;
    touch-action: none;
    cursor: grab;
    border-radius: 6px;
  }
  #view:active { cursor: grabbing; }

  #drop {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    text-align: center;
    padding: 24px;
  }
  #drop h1 {
    margin: 0;
    font-size: 18px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }
  #drop p { margin: 0; color: var(--muted); font-size: 14px; max-width: 340px; line-height: 1.5; }
  #drop .hint { font-size: 12px; }
  body.dragover #drop { outline: 2px dashed var(--accent); outline-offset: -12px; border-radius: 16px; }

  button {
    appearance: none;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(255, 255, 255, 0.06);
    color: var(--ink);
    font: inherit;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { background: rgba(255, 255, 255, 0.14); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #1a1607; font-weight: 600; }
  button.primary:active { filter: brightness(1.1); }
  button:disabled { opacity: 0.4; cursor: default; }

  #panel {
    flex: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px 12px calc(env(safe-area-inset-bottom) + 12px);
    background: rgba(23, 26, 33, 0.9);
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: var(--shadow);
    user-select: none;
    -webkit-user-select: none;
    max-height: 55svh;
    overflow-y: auto;
  }
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .lbl { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; width: 52px; flex: none; }
  .readout { font-variant-numeric: tabular-nums; font-size: 13px; color: var(--accent); }
  .hint { color: var(--muted); font-size: 12px; }
  input[type="range"] { flex: 1; min-width: 120px; accent-color: var(--accent); }
  select, input[type="color"] {
    font: inherit; font-size: 13px;
    background: rgba(255, 255, 255, 0.06);
    color: var(--ink);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 8px;
    padding: 6px 8px;
  }
  input[type="color"] { padding: 2px 4px; width: 44px; height: 32px; }
  .chk { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ink); }
  .chk input { accent-color: var(--accent); }
  .seg { display: inline-flex; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.12); }
  .seg button { border: none; border-radius: 0; }
  .seg button + button { border-left: 1px solid rgba(255, 255, 255, 0.12); }
  .seg button.active { background: var(--accent); color: #1a1607; font-weight: 600; }
  .actions { padding-top: 2px; }

  #busy {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0, 0, 0, 0.55);
    z-index: 20;
  }
  #busy .card {
    background: var(--panel);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 18px 20px;
    display: flex; flex-direction: column; gap: 12px;
    width: min(320px, 86vw);
    align-items: center;
  }
  #busyLabel { font-size: 14px; }
  .bar { width: 100%; height: 6px; border-radius: 3px; background: rgba(255, 255, 255, 0.1); overflow: hidden; }
  #barFill { height: 100%; width: 0%; background: var(--accent); transition: width 0.15s linear; }
  [hidden] { display: none !important; }
</style>
</head>
<body>

<div id="stage">
  <div id="drop">
    <h1>Spin</h1>
    <p>Add a photo and make it spin. Pick the speed, axis and centre, then download it as a looping GIF or video.</p>
    <button id="pick" class="primary">Choose photo</button>
    <p class="hint">or drag &amp; drop / paste an image</p>
  </div>
  <canvas id="view" hidden></canvas>
</div>

<div id="panel" hidden>
  <div class="row">
    <span class="lbl">Axis</span>
    <div class="seg" id="axisSeg">
      <button data-axis="z" class="active" title="Spin flat, in the image plane">&#8635; Z</button>
      <button data-axis="y" title="Flip around a vertical axis">&#8646; Y</button>
      <button data-axis="x" title="Tumble around a horizontal axis">&#8645; X</button>
    </div>
    <button id="dirBtn" title="Direction">cw &#8635;</button>
  </div>
  <div class="row">
    <span class="lbl">Speed</span>
    <input type="range" id="speed" min="1" max="120" value="20" />
    <span class="readout" id="speedOut">20 rpm</span>
  </div>
  <div class="row">
    <span class="lbl">Centre</span>
    <span class="readout" id="centreOut">50%, 50%</span>
    <button id="centreReset">Reset</button>
    <span class="hint">drag the photo to move it off-centre</span>
  </div>
  <div class="row">
    <span class="lbl">Output</span>
    <select id="size" title="Output size (longest side)">
      <option value="240">240 px</option>
      <option value="360">360 px</option>
      <option value="480" selected>480 px</option>
      <option value="720">720 px</option>
    </select>
    <input type="color" id="bg" value="#0f1115" title="Background colour" />
    <label class="chk"><input type="checkbox" id="trans" /> transparent (GIF only)</label>
  </div>
  <div class="row actions">
    <button id="gifBtn" class="primary">&#8595; GIF</button>
    <button id="vidBtn" class="primary">&#8595; Video</button>
    <button id="newBtn">New photo</button>
  </div>
</div>

<input type="file" id="file" accept="image/*" hidden />

<div id="busy" hidden>
  <div class="card">
    <div id="busyLabel">Rendering…</div>
    <div class="bar"><div id="barFill"></div></div>
    <button id="cancelBtn">Cancel</button>
  </div>
</div>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
const view = $("view"), vctx = view.getContext("2d");

// ---------- state ----------
let img = null, iw = 0, ih = 0;       // source image (downscaled canvas) and its size
let pivot = { x: 0, y: 0 };            // rotation centre, in source-image pixels
let axis = "z";                        // 'z' spin, 'y' horizontal flip, 'x' vertical tumble
let dir = 1;                           // 1 = clockwise, -1 = counter-clockwise
let rpm = 20;
let bg = "#0f1115";
let transparent = false;
let angle = 0, lastT = 0;
let dragging = false, dragPt = null;
let exporting = false, cancelled = false;

const VIDEO_MIME = ["video/mp4;codecs=avc1", "video/mp4", "video/webm;codecs=vp9",
  "video/webm;codecs=vp8", "video/webm"]
  .find((m) => window.MediaRecorder && MediaRecorder.isTypeSupported(m)) || null;

// ---------- geometry & drawing ----------
// The output canvas is sized so a full revolution never clips, with the
// rotation centre always at the canvas centre.
function geom() {
  if (axis === "z") {
    const R = Math.max(
      Math.hypot(pivot.x, pivot.y),
      Math.hypot(iw - pivot.x, pivot.y),
      Math.hypot(pivot.x, ih - pivot.y),
      Math.hypot(iw - pivot.x, ih - pivot.y));
    return { W: 2 * R, H: 2 * R };
  }
  if (axis === "y") return { W: 2 * Math.max(pivot.x, iw - pivot.x), H: ih };
  return { W: iw, H: 2 * Math.max(pivot.y, ih - pivot.y) };
}

// Draw one frame. W,H are canvas pixels, s scales source-image units to
// canvas units, bgFill is a colour or null for a transparent frame.
function drawFrame(ctx, W, H, s, angDeg, bgFill) {
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  if (bgFill) { ctx.fillStyle = bgFill; ctx.fillRect(0, 0, W, H); }
  else ctx.clearRect(0, 0, W, H);
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";
  ctx.translate(W / 2, H / 2);
  const rad = (angDeg * Math.PI) / 180;
  if (axis === "z") {
    ctx.rotate(rad);
    ctx.scale(s, s);
    ctx.drawImage(img, -pivot.x, -pivot.y);
  } else if (axis === "y") {
    ctx.scale(Math.cos(rad) * s, s);
    ctx.drawImage(img, -pivot.x, -ih / 2);
  } else {
    ctx.scale(s, Math.cos(rad) * s);
    ctx.drawImage(img, -iw / 2, -pivot.y);
  }
  ctx.restore();
}

let checkerPattern = null;
function checker() {
  if (!checkerPattern) {
    const c = document.createElement("canvas");
    c.width = c.height = 16;
    const x = c.getContext("2d");
    x.fillStyle = "#1c1f27"; x.fillRect(0, 0, 16, 16);
    x.fillStyle = "#262a34"; x.fillRect(0, 0, 8, 8); x.fillRect(8, 8, 8, 8);
    checkerPattern = vctx.createPattern(c, "repeat");
  }
  return checkerPattern;
}

function drawMarker(ctx, W, H) {
  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.globalAlpha = dragging ? 0.95 : 0.4;
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = "#000";
  ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = "#ffd84d";
  ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-14, 0); ctx.lineTo(-4, 0); ctx.moveTo(4, 0); ctx.lineTo(14, 0);
  ctx.moveTo(0, -14); ctx.lineTo(0, -4); ctx.moveTo(0, 4); ctx.lineTo(0, 14);
  ctx.stroke();
  ctx.restore();
}

function tick(now) {
  if (img && !exporting) {
    const dt = lastT ? now - lastT : 0;
    if (!dragging) angle = (angle + (dt / 1000) * rpm * 6 * dir) % 360;
    const g = geom();
    const s = Math.min(1, 1000 / Math.max(g.W, g.H));
    const W = Math.max(2, Math.round(g.W * s));
    const H = Math.max(2, Math.round(g.H * s));
    if (view.width !== W || view.height !== H) { view.width = W; view.height = H; }
    if (transparent) {
      vctx.setTransform(1, 0, 0, 1, 0, 0);
      vctx.fillStyle = checker();
      vctx.fillRect(0, 0, W, H);
      drawFrame(vctx, W, H, s, dragging ? 0 : angle, null);
    } else {
      drawFrame(vctx, W, H, s, dragging ? 0 : angle, bg);
    }
    drawMarker(vctx, W, H);
  }
  lastT = now;
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// ---------- pivot dragging ----------
view.addEventListener("pointerdown", (e) => {
  if (!img || exporting) return;
  dragging = true;
  dragPt = { x: e.clientX, y: e.clientY };
  view.setPointerCapture(e.pointerId);
});
view.addEventListener("pointermove", (e) => {
  if (!dragging) return;
  const rect = view.getBoundingClientRect();
  const g = geom();
  const s = Math.min(1, 1000 / Math.max(g.W, g.H));
  // css px -> canvas px -> source-image px; dragging the photo moves the
  // pivot the opposite way through the image.
  const k = (view.width / rect.width) / s;
  pivot.x = clamp(pivot.x - (e.clientX - dragPt.x) * k, -iw / 2, iw * 1.5);
  pivot.y = clamp(pivot.y - (e.clientY - dragPt.y) * k, -ih / 2, ih * 1.5);
  dragPt = { x: e.clientX, y: e.clientY };
  updateCentreOut();
});
const endDrag = () => { if (dragging) { dragging = false; angle = 0; } };
view.addEventListener("pointerup", endDrag);
view.addEventListener("pointercancel", endDrag);

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function updateCentreOut() {
  $("centreOut").textContent =
    `${Math.round((pivot.x / iw) * 100)}%, ${Math.round((pivot.y / ih) * 100)}%`;
}

// ---------- controls ----------
$("axisSeg").addEventListener("click", (e) => {
  const b = e.target.closest("button[data-axis]");
  if (!b) return;
  axis = b.dataset.axis;
  for (const x of $("axisSeg").children) x.classList.toggle("active", x === b);
});
$("dirBtn").addEventListener("click", () => {
  dir = -dir;
  $("dirBtn").innerHTML = dir === 1 ? "cw &#8635;" : "ccw &#8634;";
});
$("speed").addEventListener("input", () => {
  rpm = +$("speed").value;
  $("speedOut").textContent = `${rpm} rpm`;
});
$("centreReset").addEventListener("click", () => {
  pivot = { x: iw / 2, y: ih / 2 };
  updateCentreOut();
});
$("bg").addEventListener("input", () => { bg = $("bg").value; });
$("trans").addEventListener("input", () => { transparent = $("trans").checked; });
$("cancelBtn").addEventListener("click", () => { cancelled = true; });

// ---------- image loading ----------
async function loadFile(file) {
  if (!file || !file.type.startsWith("image/")) return;
  let bmp;
  try {
    bmp = await createImageBitmap(file, { imageOrientation: "from-image" });
  } catch {
    bmp = await new Promise((res, rej) => {
      const u = URL.createObjectURL(file);
      const im = new Image();
      im.onload = () => { URL.revokeObjectURL(u); res(im); };
      im.onerror = rej;
      im.src = u;
    });
  }
  const bw = bmp.width, bh = bmp.height;
  const sc = Math.min(1, 1600 / Math.max(bw, bh));
  const c = document.createElement("canvas");
  c.width = Math.max(1, Math.round(bw * sc));
  c.height = Math.max(1, Math.round(bh * sc));
  c.getContext("2d").drawImage(bmp, 0, 0, c.width, c.height);
  if (bmp.close) bmp.close();
  img = c; iw = c.width; ih = c.height;
  pivot = { x: iw / 2, y: ih / 2 };
  angle = 0;
  updateCentreOut();
  $("drop").hidden = true;
  view.hidden = false;
  $("panel").hidden = false;
  if (!VIDEO_MIME) { $("vidBtn").disabled = true; $("vidBtn").title = "MediaRecorder not supported in this browser"; }
}

$("pick").addEventListener("click", () => $("file").click());
$("newBtn").addEventListener("click", () => $("file").click());
$("file").addEventListener("change", () => loadFile($("file").files[0]));
window.addEventListener("dragover", (e) => { e.preventDefault(); document.body.classList.add("dragover"); });
window.addEventListener("dragleave", () => document.body.classList.remove("dragover"));
window.addEventListener("drop", (e) => {
  e.preventDefault();
  document.body.classList.remove("dragover");
  loadFile(e.dataTransfer.files[0]);
});
window.addEventListener("paste", (e) => {
  for (const item of e.clipboardData?.items || []) {
    if (item.type.startsWith("image/")) { loadFile(item.getAsFile()); return; }
  }
});

// ---------- export helpers ----------
function setBusy(on, label) {
  exporting = on;
  cancelled = false;
  $("busy").hidden = !on;
  if (label) $("busyLabel").textContent = label;
  $("barFill").style.width = "0%";
  for (const b of [$("gifBtn"), $("vidBtn"), $("newBtn")]) b.disabled = on;
  if (!on && !VIDEO_MIME) $("vidBtn").disabled = true;
}
function progress(f) { $("barFill").style.width = `${Math.round(clamp(f, 0, 1) * 100)}%`; }
function download(blob, name) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 30000);
}
function hexToRgb(h) {
  return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
}
function exportDims() {
  const size = +$("size").value;
  const g = geom();
  const sc = Math.min(1, size / Math.max(g.W, g.H)); // never upscale past the photo's own pixels
  const W = Math.max(2, Math.round(g.W * sc) & ~1);
  const H = Math.max(2, Math.round(g.H * sc) & ~1);
  return { W, H, s: sc };
}

// ---------- GIF encoder (GIF89a, median-cut palette, FS dithering, LZW) ----------
function medianCut(samples, n) {
  let boxes = [samples];
  while (boxes.length < n) {
    let bi = -1, br = -1, bc = 0;
    for (let i = 0; i < boxes.length; i++) {
      const box = boxes[i];
      if (box.length < 2) continue;
      for (let ch = 0; ch < 3; ch++) {
        let mn = 255, mx = 0;
        for (const p of box) { const v = p[ch]; if (v < mn) mn = v; if (v > mx) mx = v; }
        if (mx - mn > br) { br = mx - mn; bi = i; bc = ch; }
      }
    }
    if (bi < 0) break;
    const box = boxes[bi];
    box.sort((p, q) => p[bc] - q[bc]);
    const m = box.length >> 1;
    boxes.splice(bi, 1, box.slice(0, m), box.slice(m));
  }
  return boxes.map((box) => {
    let r = 0, g = 0, b = 0;
    for (const p of box) { r += p[0]; g += p[1]; b += p[2]; }
    const k = box.length || 1;
    return [Math.round(r / k), Math.round(g / k), Math.round(b / k)];
  });
}

function buildPalette(bgRGB, useTrans) {
  // sample the source photo (composited over the background) at reduced size
  const c = document.createElement("canvas");
  const sc = Math.min(1, 140 / Math.max(iw, ih));
  c.width = Math.max(1, Math.round(iw * sc));
  c.height = Math.max(1, Math.round(ih * sc));
  const x = c.getContext("2d");
  x.drawImage(img, 0, 0, c.width, c.height);
  const d = x.getImageData(0, 0, c.width, c.height).data;
  const samples = [];
  for (let i = 0; i < d.length; i += 4) {
    const a = d[i + 3] / 255;
    if (useTrans && a < 0.5) continue;
    samples.push([
      Math.round(d[i] * a + bgRGB[0] * (1 - a)),
      Math.round(d[i + 1] * a + bgRGB[1] * (1 - a)),
      Math.round(d[i + 2] * a + bgRGB[2] * (1 - a)),
    ]);
  }
  if (!samples.length) samples.push([...bgRGB]);
  const maxColors = 256 - 1 - (useTrans ? 1 : 0); // reserve bg entry (+ transparent slot)
  const pal = medianCut(samples, maxColors);
  pal.push([...bgRGB]);
  return { pal, bgIndex: pal.length - 1, transIndex: 255 };
}

// map one RGBA frame to palette indices with Floyd–Steinberg dithering
function frameToIndices(data, W, H, pal, useTrans, transIndex, bgRGB, cache) {
  const n = W * H;
  const out = new Uint8Array(n);
  const buf = new Float32Array(n * 3);
  for (let i = 0, j = 0; i < n; i++, j += 3) {
    const a = data[i * 4 + 3] / 255;
    buf[j] = data[i * 4] * a + bgRGB[0] * (1 - a);
    buf[j + 1] = data[i * 4 + 1] * a + bgRGB[1] * (1 - a);
    buf[j + 2] = data[i * 4 + 2] * a + bgRGB[2] * (1 - a);
  }
  const P = pal.length;
  function nearest(r, g, b) {
    const key = (r << 16) | (g << 8) | b;
    let v = cache.get(key);
    if (v !== undefined) return v;
    let best = 0, bd = Infinity;
    for (let p = 0; p < P; p++) {
      const dr = r - pal[p][0], dg = g - pal[p][1], db = b - pal[p][2];
      const d = dr * dr + dg * dg + db * db;
      if (d < bd) { bd = d; best = p; }
    }
    cache.set(key, best);
    return best;
  }
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = y * W + x, j = i * 3;
      if (useTrans && data[i * 4 + 3] < 128) { out[i] = transIndex; continue; }
      const r = clamp(Math.round(buf[j]), 0, 255);
      const g = clamp(Math.round(buf[j + 1]), 0, 255);
      const b = clamp(Math.round(buf[j + 2]), 0, 255);
      const idx = nearest(r, g, b);
      out[i] = idx;
      const er = r - pal[idx][0], eg = g - pal[idx][1], eb = b - pal[idx][2];
      if (x + 1 < W) {
        buf[j + 3] += (er * 7) / 16; buf[j + 4] += (eg * 7) / 16; buf[j + 5] += (eb * 7) / 16;
      }
      if (y + 1 < H) {
        const dn = j + W * 3;
        if (x > 0) { buf[dn - 3] += (er * 3) / 16; buf[dn - 2] += (eg * 3) / 16; buf[dn - 1] += (eb * 3) / 16; }
        buf[dn] += (er * 5) / 16; buf[dn + 1] += (eg * 5) / 16; buf[dn + 2] += (eb * 5) / 16;
        if (x + 1 < W) { buf[dn + 3] += er / 16; buf[dn + 4] += eg / 16; buf[dn + 5] += eb / 16; }
      }
    }
  }
  return out;
}

function lzwEncode(minCodeSize, indices) {
  const out = [];
  let bitBuf = 0, bitCnt = 0;
  const CLEAR = 1 << minCodeSize, EOI = CLEAR + 1;
  let codeSize = minCodeSize + 1;
  let maxcode = (1 << codeSize) - 1;
  let next = EOI + 1;
  let clearFlag = false;
  let dict = new Map();
  const emit = (code) => {
    bitBuf |= code << bitCnt;
    bitCnt += codeSize;
    while (bitCnt >= 8) { out.push(bitBuf & 255); bitBuf >>= 8; bitCnt -= 8; }
    if (clearFlag) {
      codeSize = minCodeSize + 1; maxcode = (1 << codeSize) - 1; clearFlag = false;
    } else if (next > maxcode && codeSize < 12) {
      codeSize++;
      maxcode = codeSize === 12 ? 4096 : (1 << codeSize) - 1;
    }
  };
  emit(CLEAR);
  let ent = indices[0];
  for (let i = 1; i < indices.length; i++) {
    const c = indices[i];
    const key = (ent << 8) | c;
    const found = dict.get(key);
    if (found !== undefined) { ent = found; continue; }
    emit(ent);
    if (next < 4096) {
      dict.set(key, next++);
    } else {
      dict = new Map();
      next = EOI + 1;
      clearFlag = true; // emit() resets the code size right after the CLEAR goes out
      emit(CLEAR);
    }
    ent = c;
  }
  emit(ent);
  emit(EOI);
  if (bitCnt > 0) out.push(bitBuf & 255);
  return out;
}

function u16(arr, v) { arr.push(v & 255, (v >> 8) & 255); }

function gifHeader(W, H, pal, bgIndex) {
  const b = [];
  for (const ch of "GIF89a") b.push(ch.charCodeAt(0));
  u16(b, W); u16(b, H);
  b.push(0xf7, bgIndex, 0); // 256-colour global table
  for (let i = 0; i < 256; i++) {
    const p = pal[i] || [0, 0, 0];
    b.push(p[0], p[1], p[2]);
  }
  // Netscape looping extension: loop forever
  b.push(0x21, 0xff, 0x0b);
  for (const ch of "NETSCAPE2.0") b.push(ch.charCodeAt(0));
  b.push(3, 1, 0, 0, 0);
  return new Uint8Array(b);
}

function gifFrame(indices, W, H, delayCs, useTrans, transIndex) {
  const b = [];
  b.push(0x21, 0xf9, 4, ((useTrans ? 2 : 1) << 2) | (useTrans ? 1 : 0));
  u16(b, delayCs);
  b.push(useTrans ? transIndex : 0, 0);
  b.push(0x2c); u16(b, 0); u16(b, 0); u16(b, W); u16(b, H); b.push(0);
  b.push(8); // LZW min code size
  const lzw = lzwEncode(8, indices);
  for (let i = 0; i < lzw.length; i += 255) {
    const chunk = lzw.slice(i, i + 255);
    b.push(chunk.length, ...chunk);
  }
  b.push(0);
  return new Uint8Array(b);
}

async function exportGif() {
  if (!img || exporting) return;
  setBusy(true, "Rendering GIF…");
  try {
    const { W, H, s } = exportDims();
    const bgRGB = hexToRgb(bg);
    const useTrans = transparent;
    const T = 60 / rpm; // seconds per revolution
    let N = clamp(Math.round(T * 25), 8, 180);
    const delayCs = Math.max(2, Math.round((T * 100) / N));
    const { pal, bgIndex, transIndex } = buildPalette(bgRGB, useTrans);
    const c = document.createElement("canvas");
    c.width = W; c.height = H;
    const ctx = c.getContext("2d", { willReadFrequently: true });
    const parts = [gifHeader(W, H, pal, useTrans ? transIndex : bgIndex)];
    const cache = new Map();
    for (let i = 0; i < N; i++) {
      if (cancelled) return;
      drawFrame(ctx, W, H, s, (i * 360 * dir) / N, useTrans ? null : bg);
      const data = ctx.getImageData(0, 0, W, H).data;
      const idx = frameToIndices(data, W, H, pal, useTrans, transIndex, bgRGB, cache);
      parts.push(gifFrame(idx, W, H, delayCs, useTrans, transIndex));
      progress((i + 1) / N);
      await new Promise((r) => setTimeout(r));
    }
    parts.push(new Uint8Array([0x3b]));
    download(new Blob(parts, { type: "image/gif" }), "spin.gif");
  } finally {
    setBusy(false);
  }
}

// ---------- video export (MediaRecorder, real-time, whole revolutions) ----------
async function exportVideo() {
  if (!img || exporting || !VIDEO_MIME) return;
  setBusy(true, "Recording video…");
  let rec = null;
  try {
    const { W, H, s } = exportDims();
    const c = document.createElement("canvas");
    c.width = W; c.height = H;
    const ctx = c.getContext("2d");
    drawFrame(ctx, W, H, s, 0, bg);
    const stream = c.captureStream(30);
    rec = new MediaRecorder(stream, { mimeType: VIDEO_MIME, videoBitsPerSecond: 8_000_000 });
    const chunks = [];
    rec.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };
    const stopped = new Promise((r) => { rec.onstop = r; });
    const T = 60 / rpm;
    const revs = Math.max(1, Math.ceil(1 / T)); // at least ~1 s of video, whole revs so it loops
    const totalMs = T * revs * 1000;
    rec.start(250);
    const t0 = performance.now();
    await new Promise((res) => {
      const step = (now) => {
        const el = now - t0;
        drawFrame(ctx, W, H, s, (el / 1000) * rpm * 6 * dir, bg);
        progress(el / totalMs);
        if (cancelled || el >= totalMs) res();
        else requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    });
    rec.stop();
    await stopped;
    if (cancelled) return;
    const ext = VIDEO_MIME.includes("mp4") ? "mp4" : "webm";
    download(new Blob(chunks, { type: VIDEO_MIME.split(";")[0] }), `spin.${ext}`);
  } finally {
    if (rec && rec.state !== "inactive") { try { rec.stop(); } catch {} }
    setBusy(false);
  }
}

$("gifBtn").addEventListener("click", exportGif);
$("vidBtn").addEventListener("click", exportVideo);
</script>
