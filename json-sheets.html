<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f1115" />
<title>JSON Sheets</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1f2430;
    --ink: #e9edf5;
    --muted: #8993a7;
    --accent: #ffd84d;
    --good: #4ade80;
    --bad: #f87171;
    --line: rgba(255, 255, 255, 0.08);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100svh;
    overscroll-behavior: none;
  }
  body {
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    gap: 12px;
    max-width: 1200px;
    margin: 0 auto;
  }
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    padding: 16px 4px 4px;
    flex-wrap: wrap;
  }
  h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 8px;
  }
  .url-row {
    display: flex;
    flex: 1 1 320px;
    gap: 6px;
    min-width: 0;
  }
  .url-row input {
    flex: 1;
    min-width: 0;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--ink);
    font: inherit;
    font-size: 13px;
    padding: 8px 10px;
    border-radius: 8px;
    outline: none;
  }
  .url-row input:focus { border-color: var(--accent); }
  .url-row button {
    appearance: none;
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--ink);
    font: inherit;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    white-space: nowrap;
  }
  .url-row button:hover { background: #2a3040; }
  label.opt {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--muted);
    padding: 4px 8px;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
  }
  label.opt input { accent-color: var(--accent); }
  label.opt:hover { color: var(--ink); }

  .panes {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.4fr);
    gap: 12px;
  }
  @media (max-width: 820px) {
    .panes { grid-template-columns: 1fr; }
  }
  .pane {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    min-height: 320px;
    overflow: hidden;
  }
  .pane-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
    gap: 10px;
  }
  .pane-title {
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .pane-meta {
    font-size: 12px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  textarea {
    flex: 1;
    width: 100%;
    border: none;
    background: transparent;
    color: var(--ink);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.45;
    padding: 12px;
    resize: vertical;
    outline: none;
    min-height: 320px;
    word-break: break-all;
  }
  .pane.bad { border-color: rgba(248, 113, 113, 0.6); }
  .pane.bad .pane-meta { color: var(--bad); }

  .table-wrap {
    flex: 1;
    overflow: auto;
    min-height: 0;
  }
  table {
    border-collapse: collapse;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 12px;
    width: max-content;
    min-width: 100%;
  }
  th, td {
    text-align: left;
    padding: 6px 10px;
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    white-space: nowrap;
    max-width: 360px;
    overflow: hidden;
    text-overflow: ellipsis;
    vertical-align: top;
  }
  th {
    position: sticky;
    top: 0;
    background: var(--panel-2);
    color: var(--ink);
    font-weight: 600;
    z-index: 1;
  }
  td.null { color: var(--muted); font-style: italic; }
  tr:hover td { background: rgba(255, 255, 255, 0.025); }
  .empty {
    padding: 24px;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 8px 12px;
    justify-content: flex-end;
  }
  .actions .grow { flex: 1; }
  .actions button {
    appearance: none;
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--ink);
    font: inherit;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
  }
  .actions button:hover { background: #2a3040; }
  .actions button:disabled { opacity: 0.5; cursor: not-allowed; }
  .actions button.primary {
    background: var(--accent);
    color: #0f1115;
    border-color: transparent;
    font-weight: 600;
  }
  .footer {
    padding: 8px 4px 24px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }
  .footer a { color: var(--muted); }
  .status-bad { color: var(--bad); }
  .status-good { color: var(--good); }
</style>
</head>
<body>
  <header>
    <h1>JSON Sheets</h1>
    <div id="status" class="pane-meta"></div>
  </header>

  <div class="toolbar">
    <div class="url-row">
      <input type="url" id="url" placeholder="https://api.example.com/things.json" autocomplete="off" spellcheck="false" />
      <button id="btn-fetch">Fetch</button>
    </div>
    <label class="opt">
      <input type="checkbox" id="opt-arrays" checked /> expand arrays of objects
    </label>
    <label class="opt">
      <input type="checkbox" id="opt-headers" checked /> headers row
    </label>
  </div>

  <div class="panes">
    <div class="pane" id="pane-input">
      <div class="pane-head">
        <span class="pane-title">JSON</span>
        <span class="pane-meta" id="meta-input">empty</span>
      </div>
      <textarea id="json-input" placeholder='Paste JSON here, or fetch a URL above.

Examples that work:
[
  {"name": "Ada",   "score": 91, "tags": ["math"]},
  {"name": "Grace", "score": 88}
]

{"results": [ ... ]}

{"a": 1, "b": 2}' autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
    </div>
    <div class="pane" id="pane-output">
      <div class="pane-head">
        <span class="pane-title" id="output-title">Table</span>
        <span class="pane-meta" id="meta-output">0 rows · 0 cols</span>
      </div>
      <div class="table-wrap" id="table-wrap">
        <div class="empty">Table preview appears here once you load some JSON.</div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button id="btn-sample">Sample</button>
    <button id="btn-clear">Clear</button>
    <div class="grow"></div>
    <button id="btn-copy-csv">Copy CSV</button>
    <button id="btn-copy-tsv" class="primary">Copy for Sheets</button>
    <button id="btn-open-sheets">Copy &amp; open Sheets ↗</button>
  </div>

  <div class="footer">
    Pasting into Google Sheets / Excel uses TSV. CORS-blocked URLs need to be pasted manually.
  </div>

<script>
(() => {
  // --- DOM -----------------------------------------------------------------
  const urlEl       = document.getElementById('url');
  const fetchBtn    = document.getElementById('btn-fetch');
  const inputEl     = document.getElementById('json-input');
  const paneInput   = document.getElementById('pane-input');
  const paneOutput  = document.getElementById('pane-output');
  const metaInput   = document.getElementById('meta-input');
  const metaOutput  = document.getElementById('meta-output');
  const status      = document.getElementById('status');
  const outputTitle = document.getElementById('output-title');
  const tableWrap   = document.getElementById('table-wrap');
  const headersOpt  = document.getElementById('opt-headers');
  const arraysOpt   = document.getElementById('opt-arrays');

  let lastTable = null; // { headers: string[], rows: string[][] } | null

  headersOpt.addEventListener('change', () => render());
  arraysOpt.addEventListener('change', () => render());

  // --- Helpers -------------------------------------------------------------
  function isPlainObject(v) {
    return v !== null && typeof v === 'object' && !Array.isArray(v);
  }

  // Pull the row collection out of an arbitrary JSON value.
  // Returns { rows: any[], path: string | null } where `path` is a hint
  // ("results", "data.items", null for whole input).
  function findRows(json) {
    if (Array.isArray(json)) return { rows: json, path: null };
    if (isPlainObject(json)) {
      // Common wrappers we'll auto-unwrap.
      const preferred = ['results', 'data', 'items', 'rows', 'records', 'values', 'entries'];
      for (const k of preferred) {
        if (Array.isArray(json[k])) return { rows: json[k], path: k };
      }
      // Look one level deep, e.g. { data: { items: [...] } }.
      for (const k of Object.keys(json)) {
        const v = json[k];
        if (isPlainObject(v)) {
          for (const k2 of preferred) {
            if (Array.isArray(v[k2])) return { rows: v[k2], path: `${k}.${k2}` };
          }
        }
      }
      // Any array property at the top level.
      for (const k of Object.keys(json)) {
        if (Array.isArray(json[k])) return { rows: json[k], path: k };
      }
      // Fallback: treat the whole object as a single row.
      return { rows: [json], path: null };
    }
    // Primitive: one row, one column.
    return { rows: [{ value: json }], path: null };
  }

  // Flatten any value into dot.path keys.
  //   { a: { b: 1 } }            -> { 'a.b': 1 }
  //   { tags: ['x', 'y'] }       -> { tags: 'x, y' }    // primitives joined
  //   { tags: [{n: 'x'}] }       -> { 'tags.0.n': 'x' } // objects-in-array
  //                                                     // get indexed paths
  // When `expandArrays` is false, arrays are always JSON-stringified.
  function flatten(value, prefix, out, expandArrays) {
    if (isPlainObject(value)) {
      const keys = Object.keys(value);
      if (keys.length === 0) {
        out[prefix || ''] = '';
        return out;
      }
      for (const k of keys) {
        const key = prefix ? `${prefix}.${k}` : k;
        flatten(value[k], key, out, expandArrays);
      }
      return out;
    }
    if (Array.isArray(value)) {
      if (value.length === 0) {
        out[prefix || ''] = '';
        return out;
      }
      const allPrimitive = value.every(
        (x) => x === null || (typeof x !== 'object'),
      );
      if (allPrimitive) {
        // Primitives → comma-joined so they read cleanly in a sheet.
        out[prefix || ''] = value.map((x) => (x === null ? '' : String(x))).join(', ');
        return out;
      }
      if (!expandArrays) {
        out[prefix || ''] = JSON.stringify(value);
        return out;
      }
      // Mixed/object arrays → recurse with index path.
      value.forEach((item, i) => {
        const key = prefix ? `${prefix}.${i}` : String(i);
        flatten(item, key, out, expandArrays);
      });
      return out;
    }
    out[prefix || ''] = value;
    return out;
  }

  // Convert an arbitrary cell value into a string for both display and
  // clipboard. Objects/arrays become compact JSON.
  function cellString(v) {
    if (v === null || v === undefined) return '';
    if (typeof v === 'string') return v;
    if (typeof v === 'number' || typeof v === 'boolean') return String(v);
    try { return JSON.stringify(v); } catch { return String(v); }
  }

  // Build { headers, rows } from raw rows.
  function buildTable(rawRows, expandArrays) {
    const seen = new Map(); // key -> insertion order
    const flat = rawRows.map((row) => {
      let obj;
      if (isPlainObject(row) || Array.isArray(row)) {
        obj = flatten(row, '', {}, expandArrays);
      } else {
        obj = { value: row };
      }
      for (const k of Object.keys(obj)) {
        if (!seen.has(k)) seen.set(k, seen.size);
      }
      return obj;
    });
    const headers = [...seen.keys()];
    const rows = flat.map((obj) => headers.map((h) => obj[h]));
    return { headers, rows };
  }

  function setStatus(msg, kind) {
    status.textContent = msg || '';
    status.classList.remove('status-bad', 'status-good');
    if (kind === 'bad') status.classList.add('status-bad');
    if (kind === 'good') status.classList.add('status-good');
  }

  // --- Render --------------------------------------------------------------
  function render() {
    paneInput.classList.remove('bad');
    const text = inputEl.value.trim();
    metaInput.textContent = text ? `${inputEl.value.length.toLocaleString()} chars` : 'empty';

    if (!text) {
      lastTable = null;
      tableWrap.innerHTML = '<div class="empty">Table preview appears here once you load some JSON.</div>';
      metaOutput.textContent = '0 rows · 0 cols';
      outputTitle.textContent = 'Table';
      setStatus('');
      return;
    }

    let parsed;
    try {
      parsed = JSON.parse(text);
    } catch (e) {
      paneInput.classList.add('bad');
      lastTable = null;
      tableWrap.innerHTML = '<div class="empty">Invalid JSON — fix the input on the left.</div>';
      metaOutput.textContent = '— · —';
      setStatus(`parse: ${e.message}`, 'bad');
      return;
    }

    const { rows: rawRows, path } = findRows(parsed);
    const table = buildTable(rawRows, arraysOpt.checked);
    lastTable = table;
    outputTitle.textContent = path ? `Table · from "${path}"` : 'Table';
    metaOutput.textContent = `${table.rows.length.toLocaleString()} rows · ${table.headers.length} cols`;
    setStatus('', 'good');
    drawTable(table);
  }

  function drawTable({ headers, rows }) {
    if (rows.length === 0) {
      tableWrap.innerHTML = '<div class="empty">Parsed, but found no rows to show.</div>';
      return;
    }
    const t = document.createElement('table');
    if (headersOpt.checked) {
      const thead = document.createElement('thead');
      const tr = document.createElement('tr');
      for (const h of headers) {
        const th = document.createElement('th');
        th.textContent = h || '(blank)';
        tr.appendChild(th);
      }
      thead.appendChild(tr);
      t.appendChild(thead);
    }
    const tbody = document.createElement('tbody');
    // Cap displayed rows for sanity; copy still uses full data.
    const MAX = 500;
    const shown = rows.slice(0, MAX);
    for (const row of shown) {
      const tr = document.createElement('tr');
      for (const v of row) {
        const td = document.createElement('td');
        if (v === null || v === undefined) {
          td.textContent = v === null ? 'null' : '';
          if (v === null) td.classList.add('null');
        } else {
          td.textContent = cellString(v);
        }
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
    t.appendChild(tbody);
    tableWrap.innerHTML = '';
    tableWrap.appendChild(t);
    if (rows.length > MAX) {
      const note = document.createElement('div');
      note.className = 'empty';
      note.textContent = `Showing first ${MAX} of ${rows.length.toLocaleString()} rows. Copy includes everything.`;
      tableWrap.appendChild(note);
    }
  }

  // --- Serialisation -------------------------------------------------------
  function toTSV(table, withHeaders) {
    // Tab-separated, with embedded tabs/newlines flattened to spaces so a
    // single Sheets paste lands in one cell per value.
    const sanitize = (s) => cellString(s).replace(/\r?\n|\t/g, ' ');
    const lines = [];
    if (withHeaders) lines.push(table.headers.map(sanitize).join('\t'));
    for (const row of table.rows) lines.push(row.map(sanitize).join('\t'));
    return lines.join('\n');
  }

  function toCSV(table, withHeaders) {
    const quote = (v) => {
      const s = cellString(v);
      return /[",\r\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    };
    const lines = [];
    if (withHeaders) lines.push(table.headers.map(quote).join(','));
    for (const row of table.rows) lines.push(row.map(quote).join(','));
    return lines.join('\r\n');
  }

  // --- Copy + Sheets -------------------------------------------------------
  async function copyText(text, btn, label) {
    if (!text) return;
    try {
      await navigator.clipboard.writeText(text);
      const orig = btn.textContent;
      btn.textContent = label || 'Copied!';
      setTimeout(() => { btn.textContent = orig; }, 1100);
    } catch (e) {
      setStatus(`copy failed: ${e.message}`, 'bad');
    }
  }

  document.getElementById('btn-copy-tsv').addEventListener('click', (e) => {
    if (!lastTable) return;
    copyText(toTSV(lastTable, headersOpt.checked), e.currentTarget, 'Copied TSV ✓');
  });
  document.getElementById('btn-copy-csv').addEventListener('click', (e) => {
    if (!lastTable) return;
    copyText(toCSV(lastTable, headersOpt.checked), e.currentTarget, 'Copied CSV ✓');
  });
  // Google Sheets has no URL-prefill API for arbitrary data, but
  // sheets.new opens a fresh blank sheet — copy first, then ⌘/Ctrl-V.
  document.getElementById('btn-open-sheets').addEventListener('click', async (e) => {
    if (!lastTable) return;
    const tsv = toTSV(lastTable, headersOpt.checked);
    try {
      await navigator.clipboard.writeText(tsv);
      setStatus('Copied. Opening sheets.new — paste with ⌘/Ctrl-V.', 'good');
    } catch {
      setStatus('Couldn’t copy automatically. Use Copy for Sheets, then paste.', 'bad');
    }
    window.open('https://sheets.new', '_blank', 'noopener');
  });

  // --- Sample / clear ------------------------------------------------------
  document.getElementById('btn-sample').addEventListener('click', () => {
    inputEl.value = JSON.stringify({
      results: [
        { id: 1, name: 'Ada Lovelace',  address: { city: 'London',  country: 'UK' }, tags: ['math', 'cs'],      posts: [{ title: 'Notes on the analytical engine', views: 1843 }] },
        { id: 2, name: 'Grace Hopper',  address: { city: 'NYC',     country: 'US' }, tags: ['cs', 'navy'],      posts: [{ title: 'A-0',                          views: 1952 }, { title: 'COBOL', views: 1959 }] },
        { id: 3, name: 'Katherine J.',  address: { city: 'Hampton', country: 'US' }, tags: ['math', 'physics'], posts: [] },
      ],
    }, null, 2);
    render();
  });
  document.getElementById('btn-clear').addEventListener('click', () => {
    inputEl.value = '';
    urlEl.value = '';
    render();
    inputEl.focus();
  });

  // --- Fetch ---------------------------------------------------------------
  async function doFetch() {
    const url = urlEl.value.trim();
    if (!url) { urlEl.focus(); return; }
    fetchBtn.disabled = true;
    const orig = fetchBtn.textContent;
    fetchBtn.textContent = 'Fetching…';
    setStatus(`fetching ${url}`);
    try {
      const r = await fetch(url, { headers: { Accept: 'application/json' } });
      if (!r.ok) throw new Error(`HTTP ${r.status} ${r.statusText}`);
      const text = await r.text();
      // Pretty-print if it's valid JSON, else show raw so the parse error
      // surfaces clearly in the status bar.
      try {
        inputEl.value = JSON.stringify(JSON.parse(text), null, 2);
      } catch {
        inputEl.value = text;
      }
      render();
      setStatus(`fetched ${r.status} · ${text.length.toLocaleString()} bytes`, 'good');
    } catch (e) {
      // CORS errors come through as TypeError "Failed to fetch" — call that
      // out specifically because it's the most common surprise.
      const msg = /Failed to fetch/i.test(e.message)
        ? 'fetch failed (likely CORS — paste the JSON manually)'
        : `fetch: ${e.message}`;
      setStatus(msg, 'bad');
    } finally {
      fetchBtn.disabled = false;
      fetchBtn.textContent = orig;
    }
  }
  fetchBtn.addEventListener('click', doFetch);
  urlEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); doFetch(); }
  });

  // --- Live re-parse on input ---------------------------------------------
  let renderTimer = 0;
  inputEl.addEventListener('input', () => {
    clearTimeout(renderTimer);
    renderTimer = setTimeout(render, 120);
  });

  // Init
  render();
})();
</script>
</body>
</html>
