<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f1115" />
<title>Spirit Level</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --ink: #e9edf5;
    --muted: #8993a7;
    --accent: #ffd84d;
    --good: #4ade80;
    --bad: #f87171;
    --line: rgba(255, 255, 255, 0.08);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100svh;
    overscroll-behavior: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    gap: 18px;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  h1 {
    margin: 12px 0 0;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .bubble-wrap {
    position: relative;
    width: min(78vmin, 420px);
    aspect-ratio: 1 / 1;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 35%, #1f2430 0%, #121520 70%, #0b0d13 100%);
    box-shadow:
      inset 0 0 0 2px var(--line),
      inset 0 20px 40px rgba(0, 0, 0, 0.5),
      0 10px 30px rgba(0, 0, 0, 0.5);
    overflow: hidden;
  }
  .bubble-wrap svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .bubble-wrap::before {
    content: "";
    position: absolute;
    left: 6%;
    right: 6%;
    top: 50%;
    height: 2px;
    background: rgba(255, 255, 255, 0);
    transition: background 180ms ease;
    pointer-events: none;
  }
  .bubble-wrap.upright::before { background: rgba(255, 216, 77, 0.18); }
  .bubble {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 22%;
    aspect-ratio: 1 / 1;
    margin-left: 0;
    margin-top: 0;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.85), rgba(255, 216, 77, 0.85) 45%, rgba(255, 180, 0, 0.6) 80%);
    box-shadow:
      0 0 24px rgba(255, 216, 77, 0.35),
      inset 0 0 18px rgba(255, 255, 255, 0.35);
    transition: background 180ms ease, box-shadow 180ms ease;
    will-change: transform;
  }
  .bubble.level {
    background:
      radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.9), rgba(74, 222, 128, 0.9) 45%, rgba(22, 163, 74, 0.7) 80%);
    box-shadow:
      0 0 30px rgba(74, 222, 128, 0.5),
      inset 0 0 18px rgba(255, 255, 255, 0.4);
  }

  .bar {
    width: min(78vmin, 420px);
    height: 54px;
    background: var(--panel);
    border-radius: 14px;
    position: relative;
    box-shadow: inset 0 0 0 1px var(--line), inset 0 10px 24px rgba(0, 0, 0, 0.5);
    overflow: hidden;
  }
  .bar::before,
  .bar::after {
    content: "";
    position: absolute;
    top: 10%;
    bottom: 10%;
    width: 2px;
    background: rgba(255, 255, 255, 0.15);
  }
  .bar::before { left: 50%; transform: translateX(-6px); }
  .bar::after { left: 50%; transform: translateX(5px); }
  .bar-bubble {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 52px;
    height: 44px;
    transform: translate(-50%, -50%);
    border-radius: 22px;
    background: radial-gradient(ellipse at 30% 30%, rgba(255, 255, 255, 0.85), rgba(255, 216, 77, 0.85) 50%, rgba(255, 180, 0, 0.55));
    box-shadow: 0 0 18px rgba(255, 216, 77, 0.35), inset 0 0 12px rgba(255, 255, 255, 0.35);
    transition: background 180ms ease, box-shadow 180ms ease;
    will-change: transform;
  }
  .bar-bubble.level {
    background: radial-gradient(ellipse at 30% 30%, rgba(255, 255, 255, 0.9), rgba(74, 222, 128, 0.9) 50%, rgba(22, 163, 74, 0.7));
    box-shadow: 0 0 24px rgba(74, 222, 128, 0.5), inset 0 0 12px rgba(255, 255, 255, 0.4);
  }

  .readout {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px 24px;
    width: min(78vmin, 420px);
    padding: 14px 18px;
    background: var(--panel);
    border-radius: 14px;
    box-shadow: inset 0 0 0 1px var(--line);
  }
  .readout div { display: flex; justify-content: space-between; font-variant-numeric: tabular-nums; }
  .readout span.label { color: var(--muted); font-size: 13px; }
  .readout span.val { font-size: 15px; font-weight: 600; }

  .controls {
    display: flex;
    gap: 10px;
    width: min(78vmin, 420px);
  }
  button {
    flex: 1;
    padding: 12px 14px;
    background: var(--panel);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 12px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: transform 80ms ease, background 120ms ease;
  }
  button:active { transform: scale(0.97); }
  button.primary { background: var(--accent); color: #1a1400; border-color: transparent; }

  .status {
    color: var(--muted);
    font-size: 13px;
    min-height: 1em;
    text-align: center;
    max-width: 420px;
    padding: 0 6px;
  }
</style>
</head>
<body>
  <h1>Spirit Level</h1>

  <div class="bubble-wrap" aria-label="Bullseye level">
    <svg viewBox="-100 -100 200 200" aria-hidden="true">
      <defs>
        <radialGradient id="glass" cx="50%" cy="35%" r="60%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.08)" />
          <stop offset="100%" stop-color="rgba(255,255,255,0)" />
        </radialGradient>
      </defs>
      <circle cx="0" cy="0" r="96" fill="url(#glass)" />
      <circle cx="0" cy="0" r="22" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.2" />
      <circle cx="0" cy="0" r="44" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
      <circle cx="0" cy="0" r="66" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1" />
      <line x1="-96" y1="0" x2="-28" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      <line x1="28" y1="0" x2="96" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      <line x1="0" y1="-96" x2="0" y2="-28" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      <line x1="0" y1="28" x2="0" y2="96" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
    </svg>
    <div class="bubble" id="bubble"></div>
  </div>

  <div class="bar" aria-label="Horizontal level">
    <div class="bar-bubble" id="barBubble"></div>
  </div>

  <div class="readout" aria-live="polite">
    <div><span class="label">Pitch</span><span class="val" id="pitchVal">—</span></div>
    <div><span class="label">Roll</span><span class="val" id="rollVal">—</span></div>
    <div><span class="label">Tilt</span><span class="val" id="tiltVal">—</span></div>
    <div><span class="label">Mode</span><span class="val" id="modeVal">—</span></div>
  </div>

  <div class="controls">
    <button id="calibrateBtn">Calibrate (zero)</button>
    <button id="resetBtn">Reset</button>
  </div>

  <button id="enableBtn" class="primary" style="display:none; max-width: min(78vmin, 420px); width: 100%;">
    Enable motion sensors
  </button>

  <p class="status" id="status">Tilt your device to see the bubble move.</p>

<script>
(function () {
  "use strict";

  const bubble = document.getElementById("bubble");
  const bubbleWrap = bubble.parentElement;
  const barBubble = document.getElementById("barBubble");
  const pitchVal = document.getElementById("pitchVal");
  const rollVal = document.getElementById("rollVal");
  const tiltVal = document.getElementById("tiltVal");
  const modeVal = document.getElementById("modeVal");
  const statusEl = document.getElementById("status");
  const calibrateBtn = document.getElementById("calibrateBtn");
  const resetBtn = document.getElementById("resetBtn");
  const enableBtn = document.getElementById("enableBtn");

  const MAX_TILT_DEG = 30;          // bubble maxes out at this tilt
  const LEVEL_THRESHOLD_DEG = 1.0;  // within this, we say "LEVEL"
  const FLAT_THRESHOLD = 0.5;       // |gvz| above this → flat posture
  const SMOOTH = 0.18;              // EMA factor

  const DEG = 180 / Math.PI;
  const RAD = Math.PI / 180;

  // Smoothed gravity vector in DEVICE frame. Kept in device frame so a
  // screen-orientation change (which rotates the view frame) doesn't cause a
  // jump in the smoothing state.
  let smGx = 0, smGy = 0, smGz = -1;
  let haveReading = false;

  // Mode-specific calibration offsets. "flat" is bullseye-mode offsets for
  // pitch + roll. "upright" stores a single roll offset for the horizon
  // reading when the phone is held vertically.
  const defaultOffsets = () => ({
    flat:    { pitch: 0, roll: 0 },
    upright: { roll: 0 },
  });
  let off = defaultOffsets();
  try {
    const saved = JSON.parse(localStorage.getItem("spirit-level:offsets") || "null");
    if (saved && saved.flat && saved.upright) off = saved;
  } catch (_) { /* ignore */ }

  function saveOffsets() {
    try {
      localStorage.setItem("spirit-level:offsets", JSON.stringify(off));
    } catch (_) { /* ignore */ }
  }

  function fmtDeg(x) {
    if (!Number.isFinite(x)) return "—";
    const s = x >= 0 ? "+" : "−";
    return s + Math.abs(x).toFixed(1) + "°";
  }

  // Gravity in device frame from (beta, gamma) in degrees.
  // Derived from W3C DeviceOrientationEvent's Z-X'-Y'' Tait-Bryan angles,
  // using unit gravity (0, 0, -1) in the Earth frame. Alpha (compass) is
  // ignored since rotation around the vertical axis doesn't change gravity.
  // Sign check: γ > 0 means "right side of device tilted down", so gx > 0.
  function gravityFromBetaGamma(beta, gamma) {
    const b = beta * RAD;
    const g = gamma * RAD;
    const cb = Math.cos(b), sb = Math.sin(b);
    const cg = Math.cos(g), sg = Math.sin(g);
    return {
      x:  sg * cb,
      y: -sb,
      z: -cg * cb,
    };
  }

  // Rotate a device-frame vector into the current VIEW frame (the frame the
  // user actually sees), accounting for screen.orientation.angle.
  function deviceToView(v) {
    const angle =
      (screen.orientation && typeof screen.orientation.angle === "number")
        ? screen.orientation.angle
        : (window.orientation || 0);
    const rad = angle * RAD;
    const c = Math.cos(rad), s = Math.sin(rad);
    return {
      x: c * v.x - s * v.y,
      y: s * v.x + c * v.y,
      z: v.z,
    };
  }

  // Compute posture + display angles from a device-frame gravity vector.
  function anglesFromDeviceGravity(gd) {
    const gv = deviceToView(gd);
    const flat = Math.abs(gv.z) > FLAT_THRESHOLD;
    let rawPitch, rawRoll;
    if (flat) {
      // Small tilts off the horizontal plane. Both become ~0 when perfectly
      // face-up and level; positive roll = right edge of view down; positive
      // pitch = top edge of view lifted toward the user.
      rawPitch = Math.atan2(-gv.y, -gv.z) * DEG;
      rawRoll  = Math.atan2( gv.x, -gv.z) * DEG;
    } else {
      // Phone is held roughly vertical. The useful reading is how much the
      // view's horizon is rolled off true horizontal — angle of the gravity
      // vector (projected into the screen plane) from "view down".
      rawPitch = NaN;
      rawRoll  = Math.atan2( gv.x, -gv.y) * DEG;
    }
    return { flat, rawPitch, rawRoll, gv };
  }

  function render() {
    const { flat, rawPitch, rawRoll } = anglesFromDeviceGravity({
      x: smGx, y: smGy, z: smGz,
    });

    const pitch = flat ? rawPitch - off.flat.pitch : NaN;
    const roll  = flat ? rawRoll  - off.flat.roll  : rawRoll - off.upright.roll;

    const clampMax = MAX_TILT_DEG;
    const clamp = (v) => Math.max(-clampMax, Math.min(clampMax, v));
    const cr = clamp(roll);
    const cp = flat ? clamp(pitch) : 0;

    // Bullseye: in flat mode the bubble tracks pitch+roll; in upright mode
    // only the horizontal roll axis is meaningful, so the bubble rides the
    // centreline like a single-axis vial.
    const maxOffsetPct = 39;
    const x = -(cr / clampMax) * maxOffsetPct;
    const y = flat ? -(cp / clampMax) * maxOffsetPct : 0;
    bubble.style.transform =
      "translate(calc(-50% + " + x.toFixed(2) + "%), calc(-50% + " + y.toFixed(2) + "%))";

    // Horizontal bar always shows roll (works in both postures).
    const barMax = 45;
    const bx = -(cr / clampMax) * barMax;
    barBubble.style.transform =
      "translate(calc(-50% + " + bx.toFixed(2) + "%), -50%)";

    // Readouts.
    const tilt = flat
      ? Math.hypot(pitch, roll)
      : Math.abs(roll);

    pitchVal.textContent = fmtDeg(pitch);
    rollVal.textContent  = fmtDeg(roll);
    tiltVal.textContent  = Number.isFinite(tilt) ? tilt.toFixed(1) + "°" : "—";
    modeVal.textContent  = flat ? "Flat" : "Upright";

    const isLevel = Number.isFinite(tilt) && tilt < LEVEL_THRESHOLD_DEG;
    bubble.classList.toggle("level", isLevel);
    barBubble.classList.toggle("level", isLevel);
    bubbleWrap.classList.toggle("upright", !flat);
    tiltVal.style.color = isLevel ? "var(--good)" : "var(--ink)";
  }

  function onOrientation(e) {
    if (e.beta == null || e.gamma == null) return;
    const g = gravityFromBetaGamma(e.beta, e.gamma);
    if (!haveReading) {
      smGx = g.x; smGy = g.y; smGz = g.z;
      haveReading = true;
    } else {
      smGx += (g.x - smGx) * SMOOTH;
      smGy += (g.y - smGy) * SMOOTH;
      smGz += (g.z - smGz) * SMOOTH;
    }
    render();
  }

  function attach() {
    window.addEventListener("deviceorientation", onOrientation, true);
    if (screen.orientation && screen.orientation.addEventListener) {
      screen.orientation.addEventListener("change", render);
    }
  }

  function needsIOSPermission() {
    return (
      typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function"
    );
  }

  function requestIOSPermission() {
    DeviceOrientationEvent.requestPermission()
      .then((state) => {
        if (state === "granted") {
          enableBtn.style.display = "none";
          statusEl.textContent = "Tilt your device to see the bubble move.";
          attach();
        } else {
          statusEl.textContent = "Motion sensor permission denied.";
        }
      })
      .catch(() => {
        statusEl.textContent = "Could not enable motion sensors.";
      });
  }

  function init() {
    if (typeof DeviceOrientationEvent === "undefined") {
      statusEl.textContent =
        "Your browser doesn't support device orientation. Try this page on a phone or tablet.";
      return;
    }
    if (needsIOSPermission()) {
      enableBtn.style.display = "block";
      enableBtn.addEventListener("click", requestIOSPermission);
      statusEl.textContent = "Tap “Enable motion sensors” to start.";
    } else {
      attach();
      setTimeout(() => {
        if (!haveReading) {
          statusEl.textContent =
            "No orientation data received. On desktop, try the device emulator in your browser's dev tools.";
        }
      }, 1500);
    }
  }

  calibrateBtn.addEventListener("click", () => {
    if (!haveReading) {
      statusEl.textContent = "No reading yet — move your device first.";
      return;
    }
    const { flat, rawPitch, rawRoll } = anglesFromDeviceGravity({
      x: smGx, y: smGy, z: smGz,
    });
    if (flat) {
      off.flat.pitch = rawPitch;
      off.flat.roll = rawRoll;
      statusEl.textContent = "Flat calibration saved. This position is now “level”.";
    } else {
      off.upright.roll = rawRoll;
      statusEl.textContent = "Upright calibration saved. This position is now “level”.";
    }
    saveOffsets();
    render();
  });

  resetBtn.addEventListener("click", () => {
    off = defaultOffsets();
    saveOffsets();
    statusEl.textContent = "Calibration reset.";
    render();
  });

  init();
})();
</script>
</body>
</html>
