<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0e0e0e" />
<title>drawa7</title>
<style>
  :root {
    --bg: #0e0e0e;
    --ink: #e8e8e8;
    --muted: #8a8a8a;
    --line: #333;
    --grid: #ff3b30;
    --grid-paper: #a9bede;
    --grid-paper-center: #5b7fc7;
  }
  * { box-sizing: border-box; border-radius: 0; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
    height: 100svh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  #stage {
    position: fixed;
    inset: 0;
    overflow: auto; /* pan when the page is larger than the viewport */
    display: grid;
  }
  #stage-inner {
    margin: auto; /* centred when it fits, pannable when it doesn't */
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 12px 12px 76px; /* bottom room for the control bar */
  }

  #page-wrap { position: relative; flex: none; }
  #page {
    position: relative;
    background: #000;
    overflow: hidden;
    outline: 1px solid var(--ink);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #page video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    background: #000;
  }
  #page video.mirror { transform: scaleX(-1); }
  #grid {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  #grid line { stroke: var(--grid); stroke-width: 1; }
  #grid line.minor { opacity: 0.5; }
  #page:not([data-mode="grid"]) #grid line {
    filter: drop-shadow(0 0 1px rgba(0, 0, 0, 0.8));
  }

  /* Grid-only mode: blank white paper, graph-paper blue lines. */
  #page[data-mode="grid"] { background: #fff; }
  #page[data-mode="grid"] video { visibility: hidden; }
  #page[data-mode="grid"] #grid line { stroke: var(--grid-paper-center); }
  #page[data-mode="grid"] #grid line.minor { stroke: var(--grid-paper); opacity: 1; }

  #hint {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    user-select: none;
    -webkit-user-select: none;
  }
  #hint b { color: var(--ink); font-weight: 400; }

  .panel {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: calc(env(safe-area-inset-bottom) + 12px);
    display: flex;
    background: var(--bg);
    border: 1px solid var(--line);
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    z-index: 5;
  }
  button {
    appearance: none;
    border: none;
    background: transparent;
    color: var(--ink);
    font: inherit;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 11px 14px;
    cursor: pointer;
    white-space: nowrap;
  }
  .panel button + button { border-left: 1px solid var(--line); }
  .panel[hidden] { display: none; }
  button:active { background: #222; }

  .overlay {
    position: fixed;
    inset: 0;
    overflow: auto;
    display: grid;
    background: var(--bg);
    z-index: 10;
  }
  .overlay[hidden] { display: none; }
  .overlay-inner {
    margin: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    padding: 24px;
    text-align: center;
  }
  .overlay h1 {
    margin: 0;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }
  .overlay p {
    margin: 0;
    color: var(--muted);
    font-size: 12px;
    max-width: 320px;
    line-height: 1.7;
  }
  .overlay button.primary {
    border: 1px solid var(--ink);
    padding: 12px 24px;
  }
  .error {
    color: #f66;
    font-size: 11px;
    max-width: 320px;
    min-height: 1.2em;
  }

  /* Calibration: card outline centred over the live page, controls in the bar */
  #card {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    outline: 1px solid var(--ink);
    pointer-events: none; /* taps pass through to the page */
    z-index: 2;
  }
  body.cal #card { display: block; }
  #cal-panel {
    align-items: center;
    width: min(94vw, 520px);
    padding: 0 4px;
  }
  #cal-panel input[type="range"] {
    flex: 1;
    min-width: 60px;
    -webkit-appearance: none;
    appearance: none;
    height: 44px;
    margin: 0 6px;
    background: transparent;
    touch-action: none;
  }
  #cal-panel input[type="range"]::-webkit-slider-runnable-track {
    height: 1px;
    background: var(--muted);
  }
  #cal-panel input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 30px;
    margin-top: -15px;
    border: none;
    background: var(--ink);
  }
  #cal-panel input[type="range"]::-moz-range-track {
    height: 1px;
    background: var(--muted);
  }
  #cal-panel input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 30px;
    border: none;
    border-radius: 0;
    background: var(--ink);
  }
  .cal-step {
    width: 40px;
    height: 44px;
    padding: 0;
    font-size: 16px;
    flex: none;
  }
  #cal-readout {
    font-variant-numeric: tabular-nums;
    font-size: 12px;
    letter-spacing: 0.05em;
    padding: 0 8px;
    flex: none;
  }
  #cal-done { border-left: 1px solid var(--line); }
</style>
</head>
<body>
  <div id="stage">
    <div id="stage-inner">
      <div id="page-wrap">
        <div id="page" data-mode="live">
          <video id="video" autoplay playsinline muted></video>
          <svg id="grid" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"></svg>
        </div>
        <div id="card"></div>
      </div>
      <div id="hint"></div>
    </div>
  </div>

  <div class="panel" id="main-panel">
    <button id="switch">Flip</button>
    <button id="rotate">Rotate</button>
    <button id="gridBtn">Grid: Centre</button>
    <button id="calBtn">Size</button>
  </div>

  <div class="panel" id="cal-panel" hidden>
    <button id="cal-minus" class="cal-step">−</button>
    <input type="range" id="cal-slider" min="0.60" max="1.40" step="0.005" value="1" />
    <button id="cal-plus" class="cal-step">+</button>
    <span id="cal-readout">100.0%</span>
    <button id="cal-done">Done</button>
  </div>

  <div class="overlay" id="start-overlay">
    <div class="overlay-inner">
      <h1>drawa7</h1>
      <p>An A7 page (74 × 105 mm) at actual size, filled by the camera, with
      centre gridlines. Tap the page: freeze → grid only → live.
      For drawing from a picture.</p>
      <button id="start" class="primary">Start camera</button>
      <div class="error" id="error"></div>
    </div>
  </div>


<script>
(() => {
  const SVG_NS = 'http://www.w3.org/2000/svg';
  const MM = 96 / 25.4;           // CSS px per nominal millimetre
  const A7 = { w: 74, h: 105 };   // mm, portrait
  const CARD = { w: 85.6, h: 53.98 }; // ISO/IEC 7810 ID-1 bank card, mm
  const SCALE_KEY = 'drawa7-scale';

  const page = document.getElementById('page');
  const video = document.getElementById('video');
  const grid = document.getElementById('grid');
  const hint = document.getElementById('hint');
  const startOverlay = document.getElementById('start-overlay');
  const startBtn = document.getElementById('start');
  const errorEl = document.getElementById('error');
  const switchBtn = document.getElementById('switch');
  const rotateBtn = document.getElementById('rotate');
  const gridBtn = document.getElementById('gridBtn');
  const calBtn = document.getElementById('calBtn');
  const mainPanel = document.getElementById('main-panel');
  const calPanel = document.getElementById('cal-panel');
  const calSlider = document.getElementById('cal-slider');
  const calReadout = document.getElementById('cal-readout');
  const calDone = document.getElementById('cal-done');
  const card = document.getElementById('card');

  let stream = null;
  let facing = 'environment';
  let mode = 'live';              // 'live' | 'frozen' | 'grid'
  let landscape = false;
  let calibrating = false;
  let scale = parseFloat(localStorage.getItem(SCALE_KEY)) || 1;
  if (!(scale >= 0.6 && scale <= 1.4)) scale = 1;

  const GRIDS = [
    { name: 'Centre', fractions: [0.5] },
    { name: 'Quarters', fractions: [0.25, 0.5, 0.75] },
    { name: 'Thirds', fractions: [1 / 3, 2 / 3] },
  ];
  let gridIndex = 0;

  function mmToPx(mm) { return mm * MM * scale; }

  function layout() {
    const w = landscape ? A7.h : A7.w;
    const h = landscape ? A7.w : A7.h;
    page.style.width = mmToPx(w) + 'px';
    page.style.height = mmToPx(h) + 'px';
    drawGrid();
  }

  function drawGrid() {
    const g = GRIDS[gridIndex];
    grid.innerHTML = '';
    for (const f of g.fractions) {
      const pct = (f * 100).toFixed(4) + '%';
      const isCenter = Math.abs(f - 0.5) < 1e-6;
      const v = document.createElementNS(SVG_NS, 'line');
      v.setAttribute('x1', pct); v.setAttribute('x2', pct);
      v.setAttribute('y1', '0'); v.setAttribute('y2', '100%');
      const h = document.createElementNS(SVG_NS, 'line');
      h.setAttribute('y1', pct); h.setAttribute('y2', pct);
      h.setAttribute('x1', '0'); h.setAttribute('x2', '100%');
      if (!isCenter) { v.classList.add('minor'); h.classList.add('minor'); }
      grid.appendChild(v);
      grid.appendChild(h);
    }
  }

  function updateHint() {
    if (calibrating) {
      hint.innerHTML = 'card 85.6 × 53.98 — wider than A7 · <b>match a real card</b>';
      return;
    }
    const size = landscape ? 'A7 105 × 74' : 'A7 74 × 105';
    const states = {
      live: '<b>live</b> — tap to freeze',
      frozen: '<b>frozen</b> — tap for grid only',
      grid: '<b>grid</b> — tap for live',
    };
    hint.innerHTML = size + ' · ' + states[mode];
  }

  function applyMode() {
    page.dataset.mode = mode;
    updateHint();
  }

  page.addEventListener('click', () => {
    if (!stream) return;
    if (mode === 'live') {
      video.pause();
      mode = 'frozen';
    } else if (mode === 'frozen') {
      mode = 'grid';
    } else {
      mode = 'live';
      video.play().catch(() => {});
    }
    applyMode();
  });

  // --- Camera ---
  async function startCamera() {
    errorEl.textContent = '';
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      errorEl.textContent = 'Camera API not available. Serve over HTTPS or localhost.';
      return;
    }
    if (stream) {
      stream.getTracks().forEach((t) => t.stop());
      stream = null;
    }
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: facing },
          width: { ideal: 1920 },
          height: { ideal: 1080 },
        },
        audio: false,
      });
      video.srcObject = stream;
      video.classList.toggle('mirror', facing === 'user');
      startOverlay.hidden = true;
      mode = 'live';
      applyMode();
      video.play().catch(() => {});
    } catch (err) {
      errorEl.textContent = `Camera error: ${err.message || err.name}`;
    }
  }

  startBtn.addEventListener('click', startCamera);
  switchBtn.addEventListener('click', () => {
    facing = facing === 'environment' ? 'user' : 'environment';
    startCamera();
  });

  rotateBtn.addEventListener('click', () => {
    landscape = !landscape;
    layout();
    updateHint();
  });

  gridBtn.addEventListener('click', () => {
    gridIndex = (gridIndex + 1) % GRIDS.length;
    gridBtn.textContent = 'Grid: ' + GRIDS[gridIndex].name;
    drawGrid();
  });

  // --- Calibration ---
  function layoutCard() {
    card.style.width = mmToPx(CARD.w) + 'px';
    card.style.height = mmToPx(CARD.h) + 'px';
    calReadout.textContent = (scale * 100).toFixed(1) + '%';
  }
  calBtn.addEventListener('click', () => {
    calibrating = true;
    calSlider.value = scale;
    layoutCard();
    document.body.classList.add('cal');
    mainPanel.hidden = true;
    calPanel.hidden = false;
    updateHint();
  });
  calSlider.addEventListener('input', () => {
    setScale(parseFloat(calSlider.value));
  });
  function setScale(v) {
    scale = Math.min(1.4, Math.max(0.6, v));
    calSlider.value = scale;
    layoutCard();
    layout();
  }
  document.getElementById('cal-minus').addEventListener('click', () => setScale(scale - 0.005));
  document.getElementById('cal-plus').addEventListener('click', () => setScale(scale + 0.005));
  calDone.addEventListener('click', () => {
    localStorage.setItem(SCALE_KEY, String(scale));
    calibrating = false;
    document.body.classList.remove('cal');
    calPanel.hidden = true;
    mainPanel.hidden = false;
    updateHint();
  });

  layout();
  updateHint();
})();
</script>
</body>
</html>
